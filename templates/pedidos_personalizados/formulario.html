{% extends 'base/base.html' %}
{% load crispy_forms_tags %}

{% block title %}{{ titulo }}{% endblock %}

{% block content %}
<div class="container py-4">
    <h2>{{ titulo }}</h2>
    <div class="card mt-4">
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                {{ form|crispy }}
                <div class="mt-3">
                    <button type="submit" class="btn btn-primary">Guardar Pedido</button>
                    <a href="{% url 'pedidos_personalizados:lista' %}" class="btn btn-secondary">Cancelar</a>
                    {% if pedido %}
                    <a href="{% url 'pedidos_personalizados:eliminar' pedido.pk %}" class="btn btn-danger float-end">Eliminar</a>
                    {% endif %}
                </div>
            </form>
        </div>
    </div>
</div>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const selectTipoPedido = document.getElementById('id_tipo_pedido_pers');
        const selectTalla = document.getElementById('id_talla_conjunto');
        const selectGenero = document.getElementById('id_genero_conjunto');
        
        function updateVisibility() {
            if (selectTipoPedido && selectTipoPedido.value === 'conjunto') {
                selectTalla.parentElement.style.display = 'block';
                selectGenero.parentElement.style.display = 'block';
            } else {
                selectTalla.parentElement.style.display = 'none';
                selectGenero.parentElement.style.display = 'none';
            }
        }
        
        if (selectTipoPedido) {
            selectTipoPedido.addEventListener('change', updateVisibility);
            updateVisibility();
        }
    });
</script>
{% endblock %}
