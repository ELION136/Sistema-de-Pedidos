<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Sistema de Gestión de Pedidos</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        body {
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }
        
        .login-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
        }
        
        .login-logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-logo i {
            font-size: 4rem;
            color: #3498db;
        }
        
        .login-logo h2 {
            color: #2c3e50;
            margin-top: 15px;
            font-weight: 700;
        }
        
        .login-logo p {
            color: #777;
            font-size: 0.95rem;
        }
        
        .form-floating {
            margin-bottom: 15px;
        }
        
        .form-floating > .form-control {
            border-radius: 10px;
            border: 2px solid #e0e0e0;
        }
        
        .form-floating > .form-control:focus {
            border-color: #3498db;
            box-shadow: 0 0 0 0.2rem rgba(52, 152, 219, 0.25);
        }
        
        .btn-login {
            background: linear-gradient(135deg, #3498db, #2980b9);
            border: none;
            border-radius: 10px;
            padding: 15px;
            font-weight: 600;
            font-size: 1.1rem;
            width: 100%;
            margin-top: 10px;
        }
        
        .btn-login:hover {
            background: linear-gradient(135deg, #2980b9, #3498db);
            transform: translateY(-2px);
        }
        
        .alert {
            border-radius: 10px;
            border: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <i class="bi bi-box-seam-fill"></i>
                <h2>Gestión de Pedidos</h2>
                <p>Sistema de gestión de ropa deportiva para colegios</p>
            </div>
            
            {% if form.errors %}
                <div class="alert alert-danger" role="alert">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    Usuario o contraseña incorrectos. Por favor, intente nuevamente.
                </div>
            {% endif %}
            
            {% if next %}
                {% if user.is_authenticated %}
                    <div class="alert alert-warning" role="alert">
                        <i class="bi bi-info-circle-fill me-2"></i>
                        Su cuenta no tiene acceso a esta página.
                    </div>
                {% endif %}
            {% endif %}
            
            <form method="post" action="{% url 'core:login' %}">
                {% csrf_token %}
                <input type="hidden" name="next" value="{{ next }}">
                
                <div class="form-floating">
                    <input type="text" name="username" class="form-control" id="username" 
                           placeholder="Usuario" required autofocus>
                    <label for="username"><i class="bi bi-person me-2"></i>Usuario</label>
                </div>
                
                <div class="form-floating">
                    <input type="password" name="password" class="form-control" id="password" 
                           placeholder="Contraseña" required>
                    <label for="password"><i class="bi bi-lock me-2"></i>Contraseña</label>
                </div>
                
                <button type="submit" class="btn btn-primary btn-login">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Iniciar Sesión
                </button>
            </form>
        </div>
    </div>
    
    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
