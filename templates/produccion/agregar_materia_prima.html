{% extends 'base/base.html' %}
{% load crispy_forms_tags %}

{% block title %}Agregar Materia Prima{% endblock %}

{% block content %}
<div class="page-header">
    <h1>
        <i class="bi bi-box-seam"></i> Agregar Materia Prima
    </h1>
    <p class="text-muted">
        Orden de Producción #{{ orden.id }}
    </p>
</div>

<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">
                    <i class="bi bi-plus-circle"></i> Registrar Materia Prima
                </h5>
            </div>
            <div class="card-body">
                <form method="post" novalidate>
                    {% csrf_token %}
                    {{ form|crispy }}
                    
                    <div class="action-buttons mt-4">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save"></i> Guardar
                        </button>
                        <a href="{% url 'produccion:reporte_materia_prima' orden.id %}" class="btn btn-secondary">
                            <i class="bi bi-x-circle"></i> Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
