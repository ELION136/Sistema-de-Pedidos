{% extends 'base/base.html' %}

{% block title %}Eliminar Cliente{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-danger text-white">
                <h5 class="mb-0"><i class="bi bi-exclamation-triangle me-2"></i>Confirmar Eliminación</h5>
            </div>
            <div class="card-body text-center">
                <i class="bi bi-building text-danger" style="font-size: 4rem;"></i>
                <h4 class="mt-3">¿Desea desactivar este cliente?</h4>
                <p class="text-muted">
                    <strong>{{ cliente.nombre }}</strong>
                </p>
                
                <div class="alert alert-warning">
                    <i class="bi bi-info-circle me-2"></i>
                    Esta acción desactivará el cliente. No se eliminarán los pedidos asociados.
                </div>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-3">
                        <a href="{% url 'clientes:detalle' cliente.pk %}" class="btn btn-secondary">
                            <i class="bi bi-x-circle me-2"></i>Cancelar
                        </a>
                        <button type="submit" class="btn btn-danger">
                            <i class="bi bi-trash me-2"></i>Desactivar Cliente
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
